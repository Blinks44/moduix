name: Changeset Check

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: changeset-check-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changeset-check:
    name: Require changeset for releasable React changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate changeset
        shell: bash
        run: |
          set -euo pipefail

          base_ref="${{ github.base_ref }}"
          git fetch origin "${base_ref}" --depth=1

          changed_files="$(git diff --name-only "origin/${base_ref}"...HEAD)"

          if [[ -z "${changed_files}" ]]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "Changed files:"
          echo "${changed_files}"

          releasable_files="$(
            printf '%s\n' "${changed_files}" \
              | grep -E '^(packages/react/package\.json|packages/react/rslib\.config\.ts|packages/react/tsconfig(\.build)?\.json|packages/react/src/)' \
              | grep -Ev '(^packages/react/src/components/.+/[^/]+\.md$|^packages/react/stories/|^packages/react/tests/)' \
              || true
          )"

          if [[ -z "${releasable_files}" ]]; then
            echo "No releasable React changes detected. Skipping changeset requirement."
            exit 0
          fi

          echo "Releasable React files:"
          echo "${releasable_files}"

          if grep -Eq '^\.changeset/[^/]+\.md$' <<< "${changed_files}"; then
            echo "Changeset file found. Check passed."
            exit 0
          fi

          echo "::error::This PR changes releasable files in packages/react but does not include a changeset file in .changeset/*.md"
          echo "Run 'npm run changeset' and commit the generated file."
          exit 1