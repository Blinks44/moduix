name: Changeset Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: changeset-release-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  changeset-release:
    name: Publish packages to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit belongs to main
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --depth=1

          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is on main."
            exit 0
          fi

          echo "::error::Tag ${GITHUB_REF_NAME} does not point to a commit on main."
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Check if package version is already published
        id: release-check
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p \"require('./packages/ui/package.json').name\")"
          package_version="$(node -p \"require('./packages/ui/package.json').version\")"

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "publish_required=false" >> "$GITHUB_OUTPUT"
            echo "Version ${package_name}@${package_version} already exists on npm. Skipping publish."
            exit 0
          fi

          echo "publish_required=true" >> "$GITHUB_OUTPUT"
          echo "Version ${package_name}@${package_version} is not published yet. Starting release."

      - name: Publish packages
        if: steps.release-check.outputs.publish_required == 'true'
        run: npm run changeset:release