name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit belongs to main
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --depth=1

          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit is on main."
            exit 0
          fi

          echo "::error::Tag ${GITHUB_REF_NAME} does not point to a commit on main."
          exit 1

      - name: Setup Node.jsа
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Publish packages
        run: npm run changeset:release